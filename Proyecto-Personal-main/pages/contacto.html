<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/estilos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,350;1,350&family=Orbitron:wght@400..900&family=Pacifico&display=swap"
        rel="stylesheet">
    <title>Contacto</title>
</head>

<body> <!--Parte Escencial 1-->

    <div class="layout">

        <nav class="navgeneral"> <!--Parte Escencial 3-->
            <ul>
                <li><a href="experiencia.html">Experiencia</a></li>
                <li><a href="../index.html">Inicio</a></li>
            </ul>
        </nav>

        <header> <!--Parte Escencial 2-->
            <h1 class="contacto">Contacto</h1>
        </header>




        <main> <!--Parte Escencial 4-->

            <p class="formulariotitulo">Completá el formulario y me pondré en contacto</p>

            <section class="section__form"> <!--Parte Escencial 5-->

                <form class="form__card" action="#" method="post"> <!--Comienzo formulario-->

                    <div class="datospersonales">
                        <label for="nombre">Nombre:</label> <!--Nombre-->
                        <input type="text" name="nombre" id="nombre" required> <!--Fin nombre-->

                        <label for="apellido">Apellido:</label> <!--Apellido-->
                        <input type="text" name="apellido" id="apellido" required> <!--Fin apellido-->

                        <label for="email">Email:</label> <!--Email-->
                        <input type="email" name="email" id="email" required> <!--Fin Email-->
                    </div>


                    <fieldset class="multiplechoice">
                        <legend>Motivo de contacto</legend>

                        <label class="radio-option">
                            <input type="radio" name="motivo" value="trabajo">
                            Propuesta laboral
                        </label>

                        <label class="radio-option">
                            <input type="radio" name="motivo" value="consulta">
                            Consulta general
                        </label>
                    </fieldset>



                    <div class="mensaje"> <!--Mensaje-->
                        <label for="mensaje">Mensaje</label>
                        <textarea name="mensaje" id="mensaje" aria-label="Mensaje" rows="5" required></textarea>
                    </div> <!--Fin mensaje-->



                    <!--Checkbox de novedades-->
                    <label class="checkbox">
                        <input type="checkbox">
                        Deseo recibir novedades
                    </label>
                    <!--Fin checkbox de novedades-->



                    <button type="submit"> Enviar </button> <!--Boton para enviar el formulario-->


                </form> <!--Cierre del formulario-->

            </section>

        </main>

        <footer>

            <p>Seguime en:</p>
            <a href="https://ar.linkedin.com/">
                <img src="../img/linkedin.png" alt="linkedin">
            </a>

            <a href="https://www.microsoft.com">
                <img src="../img/gmail.png" alt="gmail">
            </a>

            <a href="https://github.com/">
                <img src="../img/github.png" alt="github">
            </a>


        </footer> <!--Parte Escencial 6-->


    </div>
</body>

</html>
